const vcls = x => x==null?"flat":(x>0?"pos":(x<0?"neg":"flat"));

const num = x => x==null?"—":x;
function sbar(sc){
  let seg = sc>=0 ? `left:50%;width:${sc/100*50}%;background:var(--green)`
                  : `left:${50-Math.abs(sc)/100*50}%;width:${Math.abs(sc)/100*50}%;background:var(--red)`;
  return `<span class="sb"><i></i><span style="${seg}"></span></span>`;
}
function matches(m){
  if(st.q && !m.sym.toLowerCase().includes(st.q)) return false;
  if(st.filter==="bull" && m.score<20) return false;
  if(st.filter==="bear" && m.score>-20) return false;
  if(st.filter==="chop" && !(m.score>-20 && m.score<20)) return false;
  return true;
}
const COLS = [

function colsFor(mode){

  const s = mode==="short", g = k=>COL[k];

  if(!s) c.push(g("pos52"), g("atr"));
  c.push(g("wk"), g("macd"), g("sig"));

function cell(m,c){
  let v=m[c.k];
  if(c.bar){let x=v==null?0:v;return `<td class="num"><div class="sbwrap">${sbar(x)}<b class="${vcls(x)}">${(x>0?"+":"")+Math.round(x)}</b></div></td>`;}
  if(c.k==="label"){let[,cl]=bkt(m.score);return `<td class="${cl}">${v}</td>`;}
  if(c.k==="wk"){let cl=v==="↑"?"pos":(v==="↓"?"neg":"dim");return `<td class="ctr ${cl}">${v}</td>`;}
  if(c.k==="macd"){let cl=v==="多"?"pos":(v==="空"?"neg":"dim");return `<td class="${cl}">${v}</td>`;}
  if(c.pct) return `<td class="num ${vcls(v)}">${pc(v)}</td>`;
  if(c.pct2) return `<td class="num dim">${v==null?"—":v+"%"}</td>`;
  if(c.num) return `<td class="num">${num(v)}</td>`;
  return `<td class="${c.cls||""}">${v==null?"":v}</td>`;

function sortMembers(sec){
  let ms = sec.members.filter(matches);
  let s = st.sort[sec.name];
  if(s){
    ms = ms.slice().sort((a,b)=>{
      let x=a[s.key], y=b[s.key];
      if(x==null)x=-1e9; if(y==null)y=-1e9;
      if(typeof x==="string") return s.dir*x.localeCompare(y);
      return s.dir*(x-y);
    });
  }
  return ms;
}

    </div>`;
  }).join("");
  document.querySelectorAll(".card").forEach(c=>c.onclick=()=>{
    let el=document.getElementById("sec"+c.dataset.i);
    if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
  });
}
function renderSectors(){
  $("#sectors").innerHTML = DATA.sectors.map((sec,i)=>{
    let[lab,cl]=bkt(sec.score);
    let mode=st.colmode[sec.name]||"short";
    let cols=colsFor(mode);
    let ms=sortMembers(sec);
    let s=st.sort[sec.name];
    let head=cols.map(c=>{
      let ar = "";
      if(c.s) ar = (s&&s.key===c.k) ? `<span class="ar on">${s.dir>0?"▲":"▼"}</span>` : `<span class="ar">⇅</span>`;
      let kls=(c.num?"num ":"")+(c.ctr?"ctr ":"")+(c.s?"sortable":"");
      let attrs=c.s?`data-sec="${i}" data-key="${c.k}"`:"";
      return `<th class="${kls}" ${attrs}>${c.t}${ar}</th>`;
    }).join("");
    let body = ms.length ? ms.map(m=>"<tr>"+cols.map(c=>cell(m,c)).join("")+"</tr>").join("")
                         : `<tr><td colspan="${cols.length}" class="empty">无匹配</td></tr>`;
    let miss = sec.missing&&sec.missing.length ? `<div class="empty">无数据: ${sec.missing.join(", ")}</div>`:"";
    let tg=[["short","短期"],["mid","中期"]].map(([mm,t])=>
      `<button class="cm${mode===mm?" on":""}" data-sec="${i}" data-mode="${mm}">${t}</button>`).join("");
    return `<section id="sec${i}"><h2><span class="sc ${cl}">${(sec.score>0?"+":"")+Math.round(sec.score)}</span> ${sec.name}
      <span class="sub">${lab} · 广度 ${sec.n_bull}/${sec.n}多 · 周线↑${sec.wk_up}/${sec.n} · 排名 ${i+1}/${DATA.sectors.length}</span>
      <span class="cmtog">${tg}</span></h2>
      <div class="tscroll"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>${miss}</section>`;
  }).join("");
  document.querySelectorAll("th.sortable").forEach(th=>th.onclick=()=>{
    let name=DATA.sectors[+th.dataset.sec].name, key=th.dataset.key;
    let cur=st.sort[name];
    st.sort[name] = (cur&&cur.key===key)?{key,dir:-cur.dir}:{key,dir:-1};
    renderSectors();
  });
  document.querySelectorAll(".cm").forEach(b=>b.onclick=()=>{
    st.colmode[DATA.sectors[+b.dataset.sec].name]=b.dataset.mode; renderSectors();
  });
}
function heatColor(s){
  s=Math.max(-100,Math.min(100,s||0));
  const mag=Math.abs(s)/100, hue=s>=0?145:2, sat=Math.round(18+62*mag), light=Math.round(20+5*(1-mag));
  return `hsl(${hue} ${sat}% ${light}%)`;
}
function secScore(sec,mode){
  if(mode!=="short") return sec.score;
  let a=sec.members.map(m=>m.st).filter(x=>x!=null);
  return a.length? a.reduce((s,x)=>s+x,0)/a.length : 0;
}
function renderHeat(){
  let mode=st.heatmode, val=m=>(mode==="short"?(m.st==null?0:m.st):m.score);
  let secs=DATA.sectors.map(sec=>({sec,ss:secScore(sec,mode)})).sort((a,b)=>b.ss-a.ss);
  let tog=`<div class="heattog">色块口径：`+
    [["short","短期分(灵敏)"],["mid","中期分"]].map(([m,t])=>
      `<button class="hm${mode===m?" on":""}" data-m="${m}">${t}</button>`).join("")+`</div>`;
  $("#board-heat").innerHTML = tog + secs.map(({sec,ss})=>{
    let tiles = sec.members.slice().sort((a,b)=>val(b)-val(a)).map(m=>{
      let x=val(m);
      return `<div class="tile" style="background:${heatColor(x)}" title="${m.label} · 中期${(m.score>0?"+":"")+Math.round(m.score)} 短期${(m.st>0?"+":"")+Math.round(m.st)} · RSI7 ${m.rsi7==null?"—":m.rsi7}"><b>${m.sym}</b><span>${(x>0?"+":"")+Math.round(x)}</span></div>`;
    }).join("");
    return `<div class="heatsec"><div class="hh">${sec.name}
      <span class="hsc" style="background:${heatColor(ss)}">${(ss>0?"+":"")+Math.round(ss)}</span>
      <span class="hb">广度 ${sec.n_bull}/${sec.n}多 · 周线↑${sec.wk_up}/${sec.n}</span></div>
      <div class="hgrid">${tiles}</div></div>`;
  }).join("");
  document.querySelectorAll(".hm").forEach(b=>b.onclick=()=>{st.heatmode=b.dataset.m;renderHeat();});
}
function render(){renderHeat();renderCards();renderSectors();}
$("#q").oninput = e=>{st.q=e.target.value.trim().toLowerCase();renderSectors();};
document.querySelectorAll("#filter button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("#filter button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); st.filter=b.dataset.f; renderSectors();
});
document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("#tabs button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on");
  document.querySelectorAll(".board").forEach(bd=>bd.classList.remove("on"));
  document.getElementById("board-"+b.dataset.board).classList.add("on");
});
$("#meta").textContent = `${DATA.date} · ${DATA.sectors.length} 板块 · 中期分=EMA20/50/200+ADX+周线共振；短期分=EMA9·9/20+RSI7+Stoch+%B+ROC5 · 数据 yfinance/指标 pandas-ta`;
$("#foot").textContent = `生成于 ${DATA.gen} · 评分为自定义加权启发式,仅供分析,非交易建议 · noindex`;
render();
</script>
</body></html>
